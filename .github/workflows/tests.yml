name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Unit tests (fxp types, Newton-Raphson, arithmetic)
        # scoped to tests/: the experiments/ scripts need the optional
        # experiments dependency group (mpmath, matplotlib)
        run: uv run pytest -q tests/

      - name: Numerical test vectors (fxp pipeline KAT)
        run: uv run python tests/check_test_vectors.py

      - name: Falcon reference self-test (SamplerZ + signature KATs)
        run: PYTHONPATH=. uv run python falcon_ref/test.py
